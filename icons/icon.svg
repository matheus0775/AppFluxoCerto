<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D68F"/>
      <stop offset="100%" stop-color="#5B8AF8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Bar chart icon -->
  <rect x="96"  y="280" width="80" height="136" rx="12" fill="white" opacity="0.95"/>
  <rect x="216" y="200" width="80" height="216" rx="12" fill="white" opacity="0.95"/>
  <rect x="336" y="140" width="80" height="276" rx="12" fill="white" opacity="0.95"/>
  <!-- Trend line -->
  <polyline points="136,260 256,180 376,120" stroke="rgba(255,255,255,0.5)" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots on line -->
  <circle cx="136" cy="260" r="14" fill="white" opacity="0.9"/>
  <circle cx="256" cy="180" r="14" fill="white" opacity="0.9"/>
  <circle cx="376" cy="120" r="14" fill="white" opacity="0.9"/>
  <!-- Bottom line -->
  <rect x="80" y="436" width="352" height="8" rx="4" fill="white" opacity="0.3"/>
</svg>
